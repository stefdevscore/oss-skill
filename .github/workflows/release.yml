name: Release Skill

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          # Automatically create release PRs and tags based on Conventional Commits
          release-type: simple
          # This helps users install specific versions via `npx skills add repo@v1.0.0`
